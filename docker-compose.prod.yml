version: '3.8'

services:
  # Laravel App (PHP-FPM) - Pulls pre-built image
  app:
    image: iyedeh/m2m-sim-app:latest
    container_name: m2m-sim-app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel_user
      - DB_PASSWORD=laravel_password
    depends_on:
      - db
    volumes:
      # Share the public directory (static assets) with the Nginx container
      - shared-assets:/var/www/html/public
      # Keep the storage persistent on the host machine
      - app-storage:/var/www/html/storage
      # Mount the env file
      - ./.env:/var/www/html/.env

  # Nginx Web Server Service
  web:
    image: nginx:alpine
    container_name: m2m-sim-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Read-only access to the shared assets volume
      - shared-assets:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  # Database Service (using MariaDB for native ARM64 support on Raspberry Pi)
  db:
    image: mariadb:10.11
    container_name: m2m-sim-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: laravel
      MARIADB_USER: laravel_user
      MARIADB_PASSWORD: laravel_password
      MARIADB_ROOT_PASSWORD: root_password
    ports:
      - "33061:3306"
    volumes:
      - db-data:/var/lib/mysql

volumes:
  shared-assets:
  app-storage:
  db-data:
