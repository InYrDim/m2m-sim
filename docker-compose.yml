services:
  # Laravel App (PHP-FPM) - Pulls pre-built image from Docker Hub
  app:
    image: iyedeh/m2m-sim-app:latest
    container_name: m2m-sim-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - shared-assets:/var/www/html/public
      - app-storage:/var/www/html/storage
      - ./.env:/var/www/html/.env
    depends_on:
      - db

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: m2m-sim-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - shared-assets:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  # Database (MariaDB - native ARM64 support for Raspberry Pi)
  db:
    image: mariadb:10.11
    container_name: m2m-sim-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-laravel}
      MARIADB_USER: ${DB_USERNAME:-laravel_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-laravel_password}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

volumes:
  shared-assets:
  app-storage:
  db-data:
