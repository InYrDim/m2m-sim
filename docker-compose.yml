services:
  db:
    image: mysql:8.0
    container_name: m2m-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-aLP1aylX4IgTdwoXEw1MX669ot7VQgTa}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-aLP1aylX4IgTdwoXEw1MX669ot7VQgTa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: iyedeh/m2m-sim-app:latest
    container_name: m2m-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_URL: https://test-sim-m2m.inyrdim.my.id
      ASSET_URL: https://test-sim-m2m.inyrdim.my.id
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-laravel}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-aLP1aylX4IgTdwoXEw1MX669ot7VQgTa}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cloudflare-bridge
      - default
volumes:
  db_data:

networks:
  cloudflare-bridge:
    external: true