services:
  db:
    image: mysql:8.0
    container_name: m2m-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-aLP1aylX4IgTdwoXEw1MX669ot7VQgTa}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-aLP1aylX4IgTdwoXEw1MX669ot7VQgTa}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
